<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Miss October &#x1F341;</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #120b12, #3a0d1c);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      overflow: hidden;
    }

    /* Falling leaves */
    .leaf {
      position: absolute;
      top: -10%;
      font-size: 22px;
      opacity: 0.8;
      animation: fall linear infinite;
    }

    @keyframes fall {
      to {
        transform: translateY(120vh) rotate(360deg);
      }
    }

    .card {
      width: 360px;
      padding: 40px 30px;
      text-align: center;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(12px);
      border-radius: 22px;
      box-shadow: 0 30px 70px rgba(0,0,0,0.6);
      animation: fade 1.2s ease;
      z-index: 1;
    }

    @media (max-width: 480px) {
      .card {
        width: calc(100vw - 28px);
        padding: 28px 20px;
      }

      h1 {
        font-size: 1.9rem;
      }
    }

    h1 {
      color: #ff6b81;
      font-size: 2.2rem;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 0.9rem;
      opacity: 0.8;
      margin-bottom: 20px;
    }

    .heart {
      font-size: 60px;
      margin: 15px 0;
      animation: beat 1.1s infinite;
    }

    .main-text {
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 25px;
    }

    button {
      padding: 12px 32px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(135deg, #ff6b81, #ff4757);
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(255,107,129,0.6);
    }

    .typing {
      margin-top: 20px;
      font-size: 0.95rem;
      line-height: 1.6;
      min-height: 120px;
      white-space: pre-line;
      display: none;
    }

    .signature {
      margin-top: 14px;
      font-style: italic;
      font-size: 0.9rem;
      opacity: 0.75;
      display: none;
    }

    @keyframes beat {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.25); }
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Leaves -->
  <div class="leaf" style="left:8%; animation-duration:12s;">&#x1F342;</div>
  <div class="leaf" style="left:25%; animation-duration:9s;">&#x1F341;</div>
  <div class="leaf" style="left:45%; animation-duration:11s;">&#x1F342;</div>
  <div class="leaf" style="left:65%; animation-duration:10s;">&#x1F341;</div>
  <div class="leaf" style="left:85%; animation-duration:13s;">&#x1F342;</div>

  <div class="card">
    <h1>To My Future Love &#x1F341;</h1>
    <div class="tagline">until fate introduces us...</div>

    <div class="heart">&#x2764;&#xFE0F;</div>

    <div class="main-text">
      Somewhere under this same sky,<br>
      your soul is already walking toward mine.
    </div>

    <button onclick="startExperience()">Open My Heart &#x1F4AB;</button>

    <div class="typing" id="typingText"></div>
    <div class="signature" id="signature">With love, Suman</div>

    <!-- Soft background music -->
    <audio id="bgMusic" loop>
      <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6bba6d5b8d.mp3" type="audio/mpeg">
    </audio>
  </div>

  <script>
    const text =
`I haven't met you yet,
but somehow, my heart already knows you.

On quiet nights, I imagine your smile,
and the peace your presence will bring.

Until the day our paths finally cross,
I will keep choosing love,
and saving the softest part of me for you.`;

    let index = 0;
    const speed = 45;

    function typeText() {
      if (index < text.length) {
        document.getElementById("typingText").innerHTML += text.charAt(index);
        index++;
        setTimeout(typeText, speed);
      } else {
        document.getElementById("signature").style.display = "block";
      }
    }

    function startExperience() {
      const typingDiv = document.getElementById("typingText");
      typingDiv.style.display = "block";

      const music = document.getElementById("bgMusic");
      music.volume = 0.4;
      const playPromise = music.play();
      if (playPromise && typeof playPromise.catch === "function") {
        playPromise.catch(() => {
          // Autoplay can be blocked by the browser; user can retry with another click.
        });
      }

      if (index === 0) typeText();
    }
  </script>

</body>
</html>
